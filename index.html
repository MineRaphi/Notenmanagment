<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/vite.svg" />
        <link rel="stylesheet" href="/styles.css">
        <!-- Ionic Core CSS -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
        <title>Notenmanagement</title>
    </head>
    <body>


        <ion-menu content-id="main-content">
        <ion-header>
            <ion-toolbar>
            <ion-title>Menu Content</ion-title>
            </ion-toolbar>
        </ion-header>
        <ion-content class="ion-padding">This is the menu content.</ion-content>
        </ion-menu>
        <div class="ion-page" id="main-content">
        <ion-header>
            <ion-toolbar>
            <ion-buttons slot="start">
                <ion-menu-button></ion-menu-button>
            </ion-buttons>
            <ion-title>Menu</ion-title>
            </ion-toolbar>
        </ion-header>
        </div>

        

        <div id="login">
            <h2>Notenmanagement</h2>
            <form id="loginForm">
                <label for="fname">Username</label>
                <input type="text" id="username" name="username">
                <br><br>
                <label for="lname">Password</label>
                <input type="password" id="password" name="password">
                <br>
                <br>
                <button type="submit" id="loginButton"><b>Login</b></button>
            </form>
        </div>

        <div id="sideMenu">
            <button onclick="document.getElementById('sideMenu').style.display = 'none'">
                <img src="hamburgerIcon-weiss.png" width="50px" height="50px">
            </button>
        </div>

        </div>

        <div id="main">
            <div id="header">
                <div id="headerText">
                    <button onclick="document.getElementById('sideMenu').style.display = 'block'">
                        <img src="hamburgerIcon-weiss.png" width="50px" height="50px">
                    </button>
                    <h2>Notenmanagement</h2>
                    <img src="LogoHTLlight.png" height="50px">
                </div>
            </div>
            <div id="startPage"></div>
        </div>

        <!-- Ionic Core JS -->
        <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
        <script nomodule src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"></script>

        <script type="module" src="/script.js"></script>
    </body>
</html>
