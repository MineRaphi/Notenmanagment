<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/vite.svg" />
        <link rel="stylesheet" href="/styles/global.css">
        <link rel="stylesheet" href="/styles/gradeBox.css">
        <link rel="stylesheet" href="/styles/header.css">
        <link rel="stylesheet" href="/styles/login.css">
        <link rel="stylesheet" href="/styles/menu.css">
        <link rel="stylesheet" href="/styles/noten.css">
        <!-- Ionic Core CSS -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
        <title>Notenmanagement</title>
    </head>
    <body>


        <ion-menu content-id="main-content" id="menu" style="--min-width: 936px --max-width: 85vw">
        <ion-header>
            <ion-toolbar>
                <ion-title>Menu Content</ion-title>
            </ion-toolbar>
        </ion-header>
        <ion-content>
            <ion-list>
                <ion-item>
                    <button id="showStart" class="menu-button">Start</button>
                </ion-item>
                <ion-item>
                    <button id="showNoten" class="menu-button">Noten</button>
                </ion-item>
                <ion-item>
                    <button id="showFruewarnung" class="menu-button">fruewarnungPage</button>
                </ion-item>
                <ion-item>
                    <button id="showInfo" class="menu-button">Info</button>
                </ion-item>
                <ion-item>
                    <button id="logout" class="menu-button">Logout</button>
                </ion-item>
            </ion-list>
        </ion-content>
        </ion-menu>


        <div class="ion-page" id="main-content">
        <ion-header>
            <ion-toolbar id="header">
                <ion-buttons slot="start">
                    <ion-menu-button style="padding-top: 9px; padding-left: 5px; color: #f0f0f0;"></ion-menu-button>
                </ion-buttons>
                <ion-title><h3 id="headerText"><b>Notenmanagement</b></h3></ion-title>
            </ion-toolbar>
        </ion-header>

        <ion-content>
            
            <div id="login">
                <h2>Notenmanagement</h2>
                <form id="loginForm">
                    <label for="fname">Username</label>
                    <input type="text" id="username" name="username">
                    <br><br>
                    <label for="lname">Password</label>
                    <input type="password" id="password" name="password">
                    <br>
                    <br>
                    <button type="submit" id="loginButton"><b>Login</b></button>
                </form>
            </div>

            <div id="main">
                <div id="startPage"></div>
                <div id="notenPage">
                    <div class="subject-header">
                        <h3>Fächer</h3>
                        <div class="subject-list" id="subjectList"></div>
                    </div>
                    <div class="subject-grade-list" id="subjectGradeList"></div>
                </div>
                <div id="fruewarnungPage">
                    <div id="fruewarnungList"></div>
                </div>
                <div id="infoPage">
                    <p>Information Page</p>
                </div>
            </div>


        </ion-content>
        </div>
        </div>

        

        <!-- Ionic Core JS -->
        <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
        <script nomodule src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"></script>

        <script type="module" src="/scripts/main.js"></script>
    </body>
</html>
